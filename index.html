<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paopao 泡泡 - 桌面智能 Agent</title>
    <style>
      :root{--ink:#193044;--muted:#607382;--paper:#f7f4ec;--line:rgba(25,48,68,.14);--accent:#2d7fc1}*{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif;background:#f6f8f6}main{width:min(1120px,calc(100vw - 32px));margin:auto}.hero{display:grid;grid-template-columns:1fr minmax(320px,.78fr);gap:40px;align-items:center;min-height:92vh;padding:42px 0}.eyebrow{margin:0 0 12px;color:var(--accent);font-size:13px;font-weight:800}.hero h1{margin:0 0 20px;font-size:clamp(46px,8vw,84px);line-height:1.04;letter-spacing:0}.lead{max-width:700px;color:#36536c;font-size:20px;line-height:1.85}.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}.button{display:inline-flex;align-items:center;min-height:48px;padding:0 18px;border:1px solid var(--line);border-radius:8px;background:white;color:inherit;text-decoration:none;font-weight:700}.button.primary{color:white;background:#193044}.visual{overflow:hidden;border:1px solid rgba(25,48,68,.12);border-radius:12px;background:var(--paper);box-shadow:0 24px 70px rgba(25,48,68,.14)}.visual img{display:block;width:100%}.section{padding:56px 0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{padding:24px;border:1px solid var(--line);border-radius:8px;background:white}.card h2{margin:0 0 10px;font-size:22px}.card p{margin:0;color:var(--muted);line-height:1.75}@media(max-width:860px){.hero,.grid{grid-template-columns:1fr}.hero{min-height:auto}.visual{order:-1}}
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div>
          <p class="eyebrow">Windows Desktop Agent · Living Library</p>
          <h1>Paopao 泡泡</h1>
          <p class="lead">泡泡是一个常驻桌面的智能 Agent。它接住文字、语音、链接、图片和文件，把零散念头整理成会生长的日记本、思想书、目标书、日报和周报。</p>
          <div class="actions">
            <a class="button primary" href="./preview/index.html">打开活书房预览</a>
            <a class="button" href="./desktop-app/README.md">桌面应用源码</a>
            <a class="button" href="./README.md">项目说明</a>
            <a class="button" href="./docs/product-architecture.md">产品架构</a>
          </div>
        </div>
        <figure class="visual"><img src="./assets/paopao-living-library.webp" alt="泡泡活书房视觉" /></figure>
      </section>
      <section class="section grid">
        <article class="card"><h2>不是 HTML 产品</h2><p>在线页面只是让别人不用安装也能体验产品气质；真正的主产品是 Electron 桌面 Agent。</p></article>
        <article class="card"><h2>不是聊天框</h2><p>泡泡不必每条都回复。它先记住，再在目标、重复模式和关键偏离处给出判断。</p></article>
        <article class="card"><h2>思想长成书</h2><p>日记、思想、人物、阅读、目标、日报和周报进入活书房，书脊随内容自然生长。</p></article>
      </section>
    </main>
  </body>
</html>
